<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLT | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary:#d63031;
            --bg:#f8fafc;
            --card-bg:#ffffff;
            --text-main:#1e293b;
            --border:#e2e8f0;
            --success:#22c55e;
            --danger:#ff4757;
        }
        *{box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:var(--bg);margin:0;}

        /* Flash Message */
        #flash-msg {
            position:fixed; top:-100px; left:50%; transform:translateX(-50%);
            background:var(--success); color:#fff; padding:15px 50px;
            border-radius:50px; transition:.4s; z-index:9999;
        }
        #flash-msg.active{top:30px;}

        /* Layout */
        #login-screen{display:flex; align-items:center; justify-content:center; height:100vh; background:var(--primary);}
        #panel{display:none;}
        .dashboard-container{display:grid; grid-template-columns:260px 1fr;}
        .sidebar{background:#fff; padding:2rem; border-right:1px solid var(--border); height:100vh;}
        .main-content{padding:2rem;}
        
        .card{background:#fff; padding:1.5rem; border-radius:12px; border:1px solid var(--border); margin-bottom: 20px;}
        input, select { width:100%; padding:12px; margin-bottom:15px; border:1px solid var(--border); border-radius:8px; }
        button { background:var(--primary); color:#fff; padding:12px; border:none; border-radius:8px; cursor:pointer; width: 100%; font-weight: 600; }
        
        .product-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; }
        .product-card{ background:#fff; border-radius:12px; border:1px solid var(--border); overflow:hidden; text-align: center; padding-bottom: 15px;}
        .product-img{ width:100%; height:180px; object-fit:cover; }

        .btn-delete {
            background: var(--danger);
            width: 80%;
            margin-top: 10px;
            padding: 8px;
            font-size: 0.85rem;
        }
        .btn-delete:hover { background: #ff6b81; }
    </style>
</head>
<body>

<div id="flash-msg">Saved Successfully</div>

<!-- LOGIN -->
<div id="login-screen">
    <div style="background:white; padding:2rem; border-radius:12px; text-align:center; width:300px;">
        <h2 style="color:var(--primary)">PLT Admin</h2>
        <input id="pass" type="password" placeholder="Enter Admin Password">
        <button id="loginBtn">Login</button>
    </div>
</div>

<!-- MAIN PANEL -->
<div id="panel">
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2 style="color:#d63031;">PLT Admin</h2>
            <p style="font-size: 0.8rem; color: #64748b;">Store Management</p>
            <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
            <a href="index.html" style="text-decoration:none; color:var(--text-main); font-weight:600;">View Shop</a>
        </aside>

        <main class="main-content">
            <div class="card">
                <h3>Add New Product</h3>
                <input id="prodName" placeholder="Product Name (e.g. Red Heels)">
                <input id="prodPrice" type="number" placeholder="Price (KES)">
                <input id="prodOldPrice" type="number" placeholder="Old Price (Optional)">
                <select id="prodCat">
                    <option value="living room essentials">Living room essentials</option>
                    <option value="utensils">Kitchen</option>
                    <option value="bathroom">Bathroom</option>
                    <option value="travel">Travel</option>
                    <option value="bedroom">Bedroom</option>
                </select>
                <label style="font-size: 0.8rem; color:#64748b;">Upload Product Photo:</label>
                <input id="prodImage" type="file" accept="image/*">
                <button id="saveBtn">Save Product to Shop</button>
            </div>

            <h3>Live Inventory</h3>
            <div id="productsDisplay" class="product-grid"></div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWj2k3nurvBGfMuKVHmapRCBb1OJIMf90",
        authDomain: "pretty-little-things-667bc.firebaseapp.com",
        databaseURL: "https://pretty-little-things-667bc-default-rtdb.firebaseio.com",
        projectId: "pretty-little-things-667bc",
        storageBucket: "pretty-little-things-667bc.firebasestorage.app",
        messagingSenderId: "168938596258",
        appId: "1:168938596258:web:3a1109f202c1b8b322f4fb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const IMGBB_API_KEY = "f3f16436d594ecc15d59adaeb9c1c80d";

    // Global delete function
    window.deleteProduct = async (id) => {
        if(confirm("Are you sure you want to delete this item?")) {
            try {
                await remove(ref(db, `products/${id}`));
                showFlash("Item Removed");
            } catch (e) {
                alert("Error deleting item");
            }
        }
    };

    document.getElementById("loginBtn").onclick = () => {
        if(document.getElementById("pass").value === "PLTLK"){
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("panel").style.display = "block";
            loadProducts();
        } else { alert("Incorrect Password"); }
    };

    document.getElementById("saveBtn").onclick = async () => {
        const name = document.getElementById("prodName").value;
        const price = document.getElementById("prodPrice").value;
        const oldPrice = document.getElementById("prodOldPrice").value;
        const category = document.getElementById("prodCat").value;
        const imageFile = document.getElementById("prodImage").files[0];
        const btn = document.getElementById("saveBtn");

        if(!name || !price || !imageFile) return alert("Please fill Name, Price, and select an Image.");

        btn.disabled = true;
        btn.innerText = "Uploading Image...";

        try {
            const formData = new FormData();
            formData.append("image", imageFile);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const imgData = await res.json();
            const imageUrl = imgData.data.url;

            await push(ref(db, "products"), {
                name,
                price: parseInt(price),
                oldPrice: oldPrice ? parseInt(oldPrice) : null,
                category,
                image: imageUrl,
                timestamp: Date.now()
            });

            showFlash("Saved Successfully");
            resetForm();
        } catch (error) {
            alert("Upload failed.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Save Product to Shop";
        }
    };

    function loadProducts() {
        onValue(ref(db, "products"), (snapshot) => {
            const display = document.getElementById("productsDisplay");
            display.innerHTML = "";
            const data = snapshot.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                display.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" class="product-img">
                        <div style="padding:10px;">
                            <h4 style="margin:5px 0;">${p.name}</h4>
                            <p style="color:var(--primary); font-weight:bold;">KSh ${p.price}</p>
                            <small style="display:block; color:#64748b; margin-bottom:5px;">${p.category}</small>
                            <button onclick="deleteProduct('${id}')" class="btn-delete">
                                <i class="fa fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>`;
            });
        });
    }

    function showFlash(msg) {
        const f = document.getElementById("flash-msg");
        f.innerText = msg;
        f.classList.add("active");
        setTimeout(() => f.classList.remove("active"), 3000);
    }

    function resetForm() {
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodOldPrice").value = "";
        document.getElementById("prodImage").value = "";
    }
</script>
</body>
</html>
