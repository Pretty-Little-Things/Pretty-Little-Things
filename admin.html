<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLT Admin | Pretty Little Things</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #b31919;
            --bg-gray: #f8fafc;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gray); margin: 0; display: flex; overflow-x: hidden; }

        /* Sidebar Styling - Mobile Responsive */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-red);
            height: 100vh;
            position: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 2000;
            transition: 0.3s ease;
        }

        .logo-section { text-align: center; padding: 10px 0; margin-bottom: 20px; }
        .logo-section i { font-size: 2rem; margin-bottom: 10px; }
        .logo-section h1 { font-size: 1.2rem; margin: 0; letter-spacing: 2px; }

        .nav-menu { flex-grow: 1; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px;
            color: rgba(255,255,255,0.8); text-decoration: none;
            margin-bottom: 5px; border-radius: 10px; cursor: pointer;
        }
        .nav-item.active { background-color: rgba(255,255,255,0.2); color: white; font-weight: 600; }

        .view-shop-card {
            background: rgba(255,255,255,0.1); border-radius: 12px; padding: 12px;
            margin-bottom: 20px; color: white; text-decoration: none; display: flex;
            justify-content: space-between; align-items: center;
        }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        header {
            background: white; padding: 15px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }

        .menu-toggle { display: none; font-size: 1.5rem; color: var(--primary-red); cursor: pointer; }

        .content-area { padding: 15px; overflow-y: auto; flex-grow: 1; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Stats & Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-box h3 { margin: 5px 0; font-size: 1.1rem; }
        .stat-box p { margin: 0; font-size: 0.6rem; color: #666; text-transform: uppercase; }

        .section-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 16px; } /* font-size 16px prevents zoom on iPhone */
        
        .preview-container { width: 100%; height: 180px; border: 2px dashed #ddd; border-radius: 10px; margin-bottom: 15px; display: none; overflow: hidden; }
        .preview-container img { width: 100%; height: 100%; object-fit: contain; }

        .btn-red { background: var(--primary-red); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .product-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
        .product-img { width: 100%; height: 140px; object-fit: cover; }
        .product-info { padding: 10px; text-align: center; }
        .product-info h4 { font-size: 0.8rem; margin: 5px 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .btn-delete { background: #fff1f1; color: #ff4757; border: none; width: 100%; padding: 7px; border-radius: 6px; font-weight: 600; font-size: 0.7rem; }

        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: var(--primary-red); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #flash-msg { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 50px; z-index: 10000; font-size: 0.8rem; }
        #flash-msg.active { top: 20px; }

        /* MOBILE SPECIFIC OVERRIDES */
        @media (max-width: 768px) {
            .sidebar { left: -100%; }
            .sidebar.open { left: 0; }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
            .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
            .overlay-bg.active { display: block; }
        }
    </style>
</head>
<body>

<div id="flash-msg">Success</div>
<div class="overlay-bg" id="sidebarOverlay" onclick="toggleMenu()"></div>

<div id="login-overlay">
    <div style="background:white; padding:30px; border-radius:20px; width:100%; max-width:320px; text-align:center;">
        <h2 style="color:var(--primary-red)">PLT Admin</h2>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="doLogin()" class="btn-red">Login</button>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <div class="logo-section">
        <i class="fa-solid fa-crown"></i>
        <h1>PLT ADMIN</h1>
    </div>

    <nav class="nav-menu">
        <div class="nav-item active" id="nav-dash" onclick="switchPage('dashboard')"><i class="fa fa-home"></i><span>Dashboard</span></div>
        <div class="nav-item" id="nav-inv" onclick="switchPage('inventory')"><i class="fa fa-box"></i><span>Inventory</span></div>
    </nav>

    <a href="index.html" target="_blank" class="view-shop-card">
        <span><i class="fa fa-eye"></i> View Shop</span>
        <i class="fa fa-arrow-right"></i>
    </a>

    <div style="padding:10px; cursor:pointer;" onclick="location.reload()"><i class="fa fa-sign-out-alt"></i> Logout</div>
</aside>

<main class="main-content">
    <header>
        <div class="menu-toggle" onclick="toggleMenu()"><i class="fa fa-bars"></i></div>
        <h3 style="margin:0; font-size:1rem;" id="page-title">Dashboard</h3>
        <div style="width:24px;"></div> </header>

    <div class="content-area">
        <div id="dashboard" class="page active">
            <div class="stats-grid">
                <div class="stat-box"><p>Total Value</p><h3 id="statVal">KSh 0</h3></div>
                <div class="stat-box"><p>Items</p><h3 id="statCount">0</h3></div>
            </div>

            <div class="section-card">
                <h3 style="margin-top:0; font-size:1rem;">Add Product</h3>
                <label>Product Name</label><input id="pName" placeholder="Enter Name">
                <label>Price (KSh)</label><input id="pPrice" type="number">
                <label>Category</label>
                <select id="pCat">
                    <option value="living.room">Living Room</option>
                    <option value="utensils">Kitchen</option>
                    <option value="bathroom">Bathroom</option>
                    <option value="giftpackages">GIFTS</option>
                    <option value="travel">Travel</option>
                    <option value="bedroom">Bedroom</option>
                    <option value="fashion">Fashion</option>
                    <option value="kidstoys">Kids</option>
                </select>
                <label>Image</label>
                <input id="pImg" type="file" accept="image/*">
                
                <div id="previewBox" class="preview-container"><img id="imagePreview"></div>

                <button id="saveBtn" class="btn-red">Save Product</button>
            </div>
        </div>

        <div id="inventory" class="page">
            <h3 style="margin-bottom:15px; font-size:1rem;">Shop Inventory</h3>
            <div id="inventoryList" class="product-grid"></div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAWj2k3nurvBGfMuKVHmapRCBb1OJIMf90",
        authDomain: "pretty-little-things-667bc.firebaseapp.com",
        databaseURL: "https://pretty-little-things-667bc-default-rtdb.firebaseio.com",
        projectId: "pretty-little-things-667bc",
        storageBucket: "pretty-little-things-667bc.firebasestorage.app",
        messagingSenderId: "168938596258",
        appId: "1:168938596258:web:3a1109f202c1b8b322f4fb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const IMGBB_KEY = "f3f16436d594ecc15d59adaeb9c1c80d";

    // MOBILE SIDEBAR TOGGLE
    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    };

    window.doLogin = () => {
        if(document.getElementById("adminPass").value === "PLTLK") {
            document.getElementById("login-overlay").style.display = "none";
            loadData();
        } else { alert("Wrong Password"); }
    };

    window.switchPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById(pageId === 'dashboard' ? 'nav-dash' : 'nav-inv').classList.add('active');
        document.getElementById('page-title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
        if(window.innerWidth < 768) toggleMenu(); // Auto close on mobile
    };

    document.getElementById('pImg').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('imagePreview').src = ev.target.result;
                document.getElementById('previewBox').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById("saveBtn").onclick = async () => {
        const name = document.getElementById("pName").value;
        const price = document.getElementById("pPrice").value;
        const cat = document.getElementById("pCat").value;
        const file = document.getElementById("pImg").files[0];
        const btn = document.getElementById("saveBtn");

        if(!name || !price || !file) return alert("All fields required");
        btn.disabled = true; btn.innerText = "Uploading...";

        try {
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
            const img = await res.json();

            await push(ref(db, "products"), {
                name, price: parseInt(price), category: cat,
                image: img.data.url, timestamp: Date.now()
            });

            flash("Product Added!");
            document.getElementById("pName").value = "";
            document.getElementById("pPrice").value = "";
            document.getElementById("pImg").value = "";
            document.getElementById('previewBox').style.display = 'none';
        } catch (e) { alert("Error uploading"); }
        finally { btn.disabled = false; btn.innerText = "Save Product"; }
    };

    function loadData() {
        onValue(ref(db, "products"), (snap) => {
            const list = document.getElementById("inventoryList");
            list.innerHTML = "";
            const data = snap.val() || {};
            const keys = Object.keys(data);
            let total = 0;

            keys.reverse().forEach(id => {
                const p = data[id];
                total += (parseInt(p.price) || 0);
                list.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" class="product-img">
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <p style="color:var(--primary-red); font-weight:700;">KSh ${p.price.toLocaleString()}</p>
                            <button onclick="deleteProd('${id}')" class="btn-delete">Delete</button>
                        </div>
                    </div>`;
            });
            document.getElementById("statVal").innerText = "KSh " + total.toLocaleString();
            document.getElementById("statCount").innerText = keys.length;
        });
    }

    window.deleteProd = (id) => {
        if(confirm("Confirm Delete?")) remove(ref(db, `products/${id}`));
    };

    function flash(m) {
        const f = document.getElementById("flash-msg");
        f.innerText = m; f.classList.add("active");
        setTimeout(() => f.classList.remove("active"), 3000);
    }
</script>
</body>
</html>
