<!DOCTYPE html>
<html lang="en">
<head>

<body>

<!-- TOP BAR -->
<header class="topbar">

        <div class="plt-monogram">
            <span>P</span>

            <span class="suffix">T</span>
            <div class="diamond"></div>

</header>

<!-- BRAND SECTION -->
<section class="brand-idea">
  <h2>🛍 Fashion • Home • Lifestyle</h2>
  <p>Delivery Available | Discounts Available</p>
</section>

<!-- CART BUTTON -->
<button id="cartFab">
  🛒 <span id="cartCount">0</span>
</button>

<!-- CART DRAWER -->
<div id="cartDrawer">
  <div class="drawer-head">
    <h3>Your Cart</h3>
    <button id="closeCart">✕</button>
  </div>
  <div id="cartBox"></div>
  <h3 id="cartTotal">Total: KSh 0</h3>
  <button id="clearCartBtn">Clear Cart</button>
  <a id="checkoutLink" class="checkout-btn" href="#">
    Checkout on WhatsApp
  </a>
  <div class="mpesa-box">
    <h4>M-Pesa Payment</h4>
    <p>Till: <strong>192461</strong></p>
    <button id="copyTill">Copy Till Number</button>
  </div>
</div>

<!-- CATEGORIES -->
<div class="category-bar">
  <button class="cat-btn active" data-cat="all">All</button>
  <button class="cat-btn" data-cat="Living room essentials">Living room essentials</button>
  <button class="cat-btn" data-cat="utensils">Kitchen</button>
  <button class="cat-btn" data-cat="Bathroom">Bathroom</button>
  <button class="cat-btn" data-cat="Travel">Travel</button>
  <button class="cat-btn" data-cat="Bedroom">Bedroom</button>
</div>

<!-- PRODUCTS -->
<div class="grid" id="productGrid"></div>

<!-- FOOTER ADMIN BUTTON -->
<footer class="footer-admin">
    <!-- Your discreet Admin Link - We will style this to the bottom right in style.css -->
    <a href="admin.html" class="admin-corner-link">
